<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Sistema de Reprogramaciones</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            position: relative;
            overflow: hidden;
            color: #1f2937;
            /* WebView Optimizations */
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }

        /* Dynamic background blobs */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.6;
        }
        body::before {
            top: -10%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: #0f172a;
            animation: float 10s ease-in-out infinite alternate;
        }
        body::after {
            bottom: -10%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: #10b981;
            animation: float 12s ease-in-out infinite alternate-reverse;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(40px, 60px); }
        }

        .login-wrapper {
            width: 100%;
            max-width: 440px;
            z-index: 1;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.12), 0 1px 3px rgba(0,0,0,0.05);
        }

        .logo-section {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo-icon {
            width: 72px;
            height: 72px;
            background: linear-gradient(135deg, #0f172a 0%, #064e3b 100%);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            box-shadow: 0 10px 24px rgba(5, 150, 105, 0.25);
            position: relative;
            overflow: hidden;
        }

        .logo-icon::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .logo-icon i {
            font-size: 32px;
            color: white;
            z-index: 1;
        }

        .logo-section h1 {
            font-size: 26px;
            color: #111827;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .logo-section p {
            color: #6b7280;
            font-size: 15px;
        }

        .alert {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            display: none;
            align-items: center;
            gap: 12px;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .alert.show {
            display: flex;
            opacity: 1;
            transform: translateY(0);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-4px); }
            40%, 80% { transform: translateX(4px); }
        }

        .alert-success.show {
            animation: none;
        }

        .alert-success {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            color: #15803d;
            box-shadow: 0 4px 12px rgba(21, 128, 61, 0.1);
        }

        .alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #b91c1c;
            box-shadow: 0 4px 12px rgba(185, 28, 28, 0.1);
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            font-size: 18px;
            transition: color 0.3s ease;
            pointer-events: none;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .password-toggle:hover {
            color: #4b5563;
            background: rgba(0, 0, 0, 0.05);
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: #f9fafb;
            border: 2px solid transparent;
            border-radius: 12px;
            font-size: 16px; /* Evita el auto-zoom al enfocar en iOS */
            color: #1f2937;
            transition: all 0.3s ease;
            user-select: auto; /* Permite escribir en el input libremente */
        }

        input::placeholder {
            color: #9ca3af;
        }

        input:hover {
            background: #f3f4f6;
        }

        input:focus {
            outline: none;
            background: #ffffff;
            border-color: #059669;
            box-shadow: 0 0 0 4px rgba(5, 150, 105, 0.15);
        }

        .input-wrapper:focus-within .input-icon {
            color: #059669;
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #4b5563;
            margin-bottom: 0;
            user-select: none;
        }

        .checkbox-container input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        .checkmark {
            height: 20px;
            width: 20px;
            background-color: #f9fafb;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            margin-right: 10px;
            position: relative;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .checkbox-container:hover input ~ .checkmark {
            border-color: #9ca3af;
        }

        .checkbox-container input:checked ~ .checkmark {
            background-color: #059669;
            border-color: #059669;
        }

        .checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        .checkbox-container input:checked ~ .checkmark:after {
            display: block;
            animation: checkmarkIn 0.2s ease-in-out forwards;
        }

        @keyframes checkmarkIn {
            0% { opacity: 0; transform: rotate(45deg) scale(0.5); }
            100% { opacity: 1; transform: rotate(45deg) scale(1); }
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 32px;
            position: relative;
            overflow: hidden;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0f172a 0%, #0f172a 100%);
            color: white;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(15, 23, 42, 0.35);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(15, 23, 42, 0.2);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.5s ease;
        }

        .btn-primary:hover::after {
            left: 100%;
        }

        .btn-primary:disabled {
            background: #9ca3af;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-primary:disabled::after {
            display: none;
        }

        .loader {
            display: none;
            justify-content: center;
            margin: 16px 0;
        }

        .loader.active {
            display: flex;
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 32px 0 24px;
            color: #9ca3af;
            font-size: 13px;
            font-weight: 500;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            padding: 0 16px;
        }

        .footer {
            text-align: center;
            margin-top: 32px;
            color: #6b7280;
            font-size: 13px;
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 32px 24px;
                border-radius: 20px;
            }

            .logo-section h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="logo-section">
            <div class="logo-icon">
                <i class="fas fa-calendar-check"></i>
            </div>
            <h1>Sistema de Reprogramaciones</h1>
            <p>Ingresa para gestionar tus reprogramaciones</p>
        </div>

        <div class="login-card">
            <div class="alert alert-error" id="errorAlert">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMessage"></span>
            </div>

            <div class="alert alert-success" id="successAlert">
                <i class="fas fa-check-circle"></i>
                <span id="successMessage"></span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label>Correo electrónico</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input 
                            type="email" 
                            id="email" 
                            placeholder="tu@correo.com"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="password" 
                            placeholder="••••••••"
                            required
                            autocomplete="current-password"
                        >
                        <button type="button" class="password-toggle" id="passwordToggle" title="Mostrar contraseña">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="checkbox-container">
                        <input type="checkbox" id="rememberUser">
                        <span class="checkmark"></span>
                        Recordar usuario
                    </label>
                </div>

                <div class="loader" id="loader">
                    <!-- unused in UI since loading state is inside the button, but kept for script safety -->
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Iniciar Sesión</span>
                </button>
            </form>

            <div class="divider">
                <span>Sistema Interno</span>
            </div>

            <div class="footer">
                © 2025 Sistema de Gestión Interna<br>Desarrollado por Alex Rendon
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
        import { getDatabase, ref, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBDRqsZI8EQaGn1lCc4Y5rIcfmLE7969zY",
            authDomain: "reprogramacionesme.firebaseapp.com",
            databaseURL: "https://reprogramacionesme-default-rtdb.firebaseio.com",
            projectId: "reprogramacionesme",
            storageBucket: "reprogramacionesme.firebasestorage.app",
            messagingSenderId: "674035461204",
            appId: "1:674035461204:web:a70b7793f71ae1c5e311c1",
            measurementId: "G-T4VJ4EQKNT"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const loader = document.getElementById('loader');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');

        function showAlert(type, message) {
            const alert = type === 'error' ? errorAlert : successAlert;
            const messageEl = document.getElementById(type + 'Message');
            
            messageEl.textContent = message;
            alert.classList.add('show');
            
            setTimeout(() => {
                alert.classList.remove('show');
            }, 4000);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                loader.classList.add('active');
                loginBtn.disabled = true;
                loginBtn.innerHTML = '<div class="spinner" style="width: 16px; height: 16px; border-width: 2px;"></div><span>Iniciando sesión...</span>';
            } else {
                loader.classList.remove('active');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>Iniciar Sesión</span>';
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || !password) {
                showAlert('error', 'Por favor completa todos los campos');
                return;
            }

            setLoading(true);

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                const userRef = ref(database, `usuarios/${user.uid}`);
                const snapshot = await get(userRef);

                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    const rol = userData.rol;

                    showAlert('success', `¡Bienvenido, ${userData.nombre}!`);

                    setTimeout(() => {
                        switch(rol) {
                            case 'auxiliar':
                                window.location.href = 'auxiliar.html';
                                break;
                            case 'supervisor':
                                window.location.href = 'supervisor.html';
                                break;
                            case 'admin':
                            case 'ejecutivo':
                            case 'analista':
                            case 'especialista':
                                window.location.href = 'dashboard.html';
                                break;
                            default:
                                showAlert('error', 'Rol de usuario no reconocido');
                                setLoading(false);
                        }
                    }, 1000);
                } else {
                    showAlert('error', 'Usuario no encontrado en la base de datos');
                    setLoading(false);
                }

            } catch (error) {
                console.error('Error de login:', error);
                
                let errorMessage = 'Error al iniciar sesión';
                
                switch(error.code) {
                    case 'auth/invalid-email':
                        errorMessage = 'Correo electrónico inválido';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = 'Esta cuenta ha sido deshabilitada';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = 'Usuario no encontrado';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = 'Contraseña incorrecta';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = 'Demasiados intentos. Intenta más tarde';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = 'Error de conexión. Verifica tu internet';
                        break;
                    case 'auth/invalid-credential':
                        errorMessage = 'Credenciales inválidas';
                        break;
                }
                
                showAlert('error', errorMessage);
                setLoading(false);
            }
        });

        document.getElementById('email').focus();

        // Funcionalidad para mostrar/ocultar contraseña
        const passwordToggle = document.getElementById('passwordToggle');
        const passwordInput = document.getElementById('password');

        passwordToggle.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            // Cambiar el icono
            const icon = this.querySelector('i');
            if (type === 'password') {
                icon.className = 'fas fa-eye';
                this.title = 'Mostrar contraseña';
            } else {
                icon.className = 'fas fa-eye-slash';
                this.title = 'Ocultar contraseña';
            }
        });

        // Funcionalidad para recordar usuario
        const rememberCheckbox = document.getElementById('rememberUser');
        const emailInput = document.getElementById('email');

        // Cargar usuario recordado al cargar la página
        window.addEventListener('load', function() {
            const rememberedUser = localStorage.getItem('rememberedUser');
            if (rememberedUser) {
                emailInput.value = rememberedUser;
                rememberCheckbox.checked = true;
            }
        });

        // Guardar o eliminar usuario recordado
        rememberCheckbox.addEventListener('change', function() {
            if (this.checked && emailInput.value.trim()) {
                localStorage.setItem('rememberedUser', emailInput.value.trim());
            } else {
                localStorage.removeItem('rememberedUser');
            }
        });

        // Actualizar localStorage cuando se cambia el email si está marcado recordar
        emailInput.addEventListener('input', function() {
            if (rememberCheckbox.checked) {
                localStorage.setItem('rememberedUser', this.value.trim());
            }
        });
    </script>
</body>
</html>
